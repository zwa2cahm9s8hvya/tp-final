# Copie a la main depuis prod-web-01 le 2026-03-06.
# Pas sur que ce soit la derniere version, Marc a dit "normalement oui".

server {
    listen 80;
    server_name loueunechevre.com www.loueunechevre.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name loueunechevre.com www.loueunechevre.com;

    ssl_certificate /etc/letsencrypt/live/loueunechevre.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/loueunechevre.com/privkey.pem;

    root /var/www/loueunechevre/current;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 20s;
    }

    # Ajoute pendant l'incident du 12/02, personne n'a ose le retirer.
    client_max_body_size 25M;
}
